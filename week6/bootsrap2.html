<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<h2 class="text-center mb-4">Student Registration Form</h2>
<div class="row justify-content-center">
<div class="col-md-6">
<form>
<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>
<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" placeholder="Enter roll number">
</div>
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter email">
</div>
<div class="mb-3">
<label class="form-label">Gender</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Male</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">other</label>
</div>
</div>
<div class="mb-3">
<label class="form-label">Department</label>
<select class="form-select">
<option>Select Department</option>
<option>CSE</option>
<option>ECE</option>
<option>IT</option>
<option>MECH</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Subjects</label><br>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">DBMS</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">EAD</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">PQT</label>
</div>

</div>
<div class="mb-3">
<label class="form-label">Upload Photo</label>
<input type="file" class="form-control">
</div>
<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</form>
<div class="alert alert-success mt-3">
Registration submitted successfully!
</div>
</div>
</div>
</div>
</body>
</html>
